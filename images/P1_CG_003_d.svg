  <path d="M 20,10 L 15,20 L 25,20 Z" fill="#e4ddd0"/>

  <text x="288" y="265" fill="#e4ddd0" font-size="14" font-style="italic">x</text>
  <text x="10" y="14" fill="#e4ddd0" font-size="14" font-style="italic">y</text>
  <text x="6" y="272" fill="#e4ddd0" font-size="14" font-style="italic">O</text>

  <!-- x-axis numbers -->
  <text x="56"  y="276" fill="#e4ddd0" font-size="12">2</text>
  <text x="96"  y="276" fill="#e4ddd0" font-size="12">4</text>
  <text x="136" y="276" fill="#e4ddd0" font-size="12">6</text>
  <text x="176" y="276" fill="#e4ddd0" font-size="12">8</text>
  <text x="212" y="276" fill="#e4ddd0" font-size="12">10</text>
  <text x="252" y="276" fill="#e4ddd0" font-size="12">12</text>

  <!-- y-axis numbers -->
  <text x="5" y="224" fill="#e4ddd0" font-size="12">2</text>
  <text x="5" y="184" fill="#e4ddd0" font-size="12">4</text>
  <text x="5" y="144" fill="#e4ddd0" font-size="12">6</text>
  <text x="5" y="104" fill="#e4ddd0" font-size="12">8</text>
  <text x="0" y="64"  fill="#e4ddd0" font-size="12">10</text>
  <text x="0" y="24"  fill="#e4ddd0" font-size="12">12</text>

  <!-- ellipse -->
  <ellipse cx="180" cy="140" rx="20" ry="120" fill="none" stroke="#e4ddd0" stroke-width="1.6"/>

  <!-- point (8,12) -->
  <text x="190" y="22" fill="#e4ddd0" font-size="14">(8, 12)</text>
