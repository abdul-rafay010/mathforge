<svg viewBox="0 0 400 180" xmlns="http://www.w3.org/2000/svg" font-family="Times New Roman, serif">
  <rect x="0" y="0" width="400" height="180" fill="#0a0a0a"/>

  <!-- outer border -->
  <rect x="20" y="20" width="360" height="140" fill="none" stroke="#e4ddd0" stroke-width="1.2"/>

  <!-- header row bottom border -->
  <line x1="20" y1="52" x2="380" y2="52" stroke="#e4ddd0" stroke-width="1.2"/>
  <!-- totals row top border -->
  <line x1="20" y1="138" x2="380" y2="138" stroke="#e4ddd0" stroke-width="1.2"/>

  <!-- vertical dividers -->
  <!-- after row label col -->
  <line x1="110" y1="20" x2="110" y2="160" stroke="#e4ddd0" stroke-width="1"/>
  <!-- after Company A -->
  <line x1="185" y1="20" x2="185" y2="160" stroke="#e4ddd0" stroke-width="1"/>
  <!-- after Company B -->
  <line x1="260" y1="20" x2="260" y2="160" stroke="#e4ddd0" stroke-width="1"/>
  <!-- after Company C -->
  <line x1="335" y1="20" x2="335" y2="160" stroke="#e4ddd0" stroke-width="1"/>

  <!-- header text -->
  <text x="147" y="42" fill="#e4ddd0" font-size="12" text-anchor="middle">Company A</text>
  <text x="222" y="42" fill="#e4ddd0" font-size="12" text-anchor="middle">Company B</text>
  <text x="297" y="42" fill="#e4ddd0" font-size="12" text-anchor="middle">Company C</text>
  <text x="357" y="42" fill="#e4ddd0" font-size="12" text-anchor="middle">Total</text>

  <!-- row labels -->
  <text x="65" y="78"  fill="#e4ddd0" font-size="12" text-anchor="middle">On time</text>
  <text x="65" y="110" fill="#e4ddd0" font-size="12" text-anchor="middle">Late</text>
  <text x="65" y="127" fill="#e4ddd0" font-size="11" text-anchor="middle">Cancelled</text>
  <text x="65" y="154" fill="#e4ddd0" font-size="12" text-anchor="middle">Total</text>

  <!-- data: On time row -->
  <text x="147" y="78"  fill="#e4ddd0" font-size="12" text-anchor="middle">7</text>
  <text x="222" y="78"  fill="#e4ddd0" font-size="12" text-anchor="middle">22</text>
  <text x="297" y="78"  fill="#e4ddd0" font-size="12" text-anchor="middle">20</text>
  <text x="357" y="78"  fill="#e4ddd0" font-size="12" text-anchor="middle">49</text>

  <!-- Late row -->
  <text x="147" y="110" fill="#e4ddd0" font-size="12" text-anchor="middle">14</text>
  <text x="222" y="110" fill="#e4ddd0" font-size="12" text-anchor="middle">11</text>
  <text x="297" y="110" fill="#e4ddd0" font-size="12" text-anchor="middle">12</text>
  <text x="357" y="110" fill="#e4ddd0" font-size="12" text-anchor="middle">37</text>

  <!-- Cancelled row -->
  <text x="147" y="127" fill="#e4ddd0" font-size="12" text-anchor="middle">4</text>
  <text x="222" y="127" fill="#e4ddd0" font-size="12" text-anchor="middle">6</text>
  <text x="297" y="127" fill="#e4ddd0" font-size="12" text-anchor="middle">4</text>
  <text x="357" y="127" fill="#e4ddd0" font-size="12" text-anchor="middle">14</text>

  <!-- Total row -->
  <text x="147" y="154" fill="#e4ddd0" font-size="12" text-anchor="middle">25</text>
  <text x="222" y="154" fill="#e4ddd0" font-size="12" text-anchor="middle">39</text>
  <text x="297" y="154" fill="#e4ddd0" font-size="12" text-anchor="middle">36</text>
  <text x="357" y="154" fill="#e4ddd0" font-size="12" text-anchor="middle">100</text>
</svg>
