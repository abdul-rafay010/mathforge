<svg viewBox="0 0 280 240" xmlns="http://www.w3.org/2000/svg" font-family="Times New Roman, serif">
  <rect x="0" y="0" width="280" height="240" fill="#0a0a0a"/>

  <!-- axes -->
  <line x1="20" y1="210" x2="250" y2="210" stroke="#e4ddd0" stroke-width="1.3"/>
  <line x1="50" y1="10" x2="50" y2="225" stroke="#e4ddd0" stroke-width="1.3"/>
  <text x="245" y="225" fill="#e4ddd0" font-size="13" font-style="italic">x</text>
  <text x="56" y="18" fill="#e4ddd0" font-size="13" font-style="italic">y</text>

  <!-- Curve -->
  <path d="M 50,125 C 100,90 160,40 210,23 C 228,20 240,25 248,38"
        fill="none" stroke="#e4ddd0" stroke-width="1.6"/>

  <!-- Line OA -->
  <line x1="50" y1="210" x2="210" y2="23" stroke="#e4ddd0" stroke-width="1.3" stroke-dasharray="5 3"/>

  <!-- y-axis segment O to (0,10) -->
  <line x1="50" y1="210" x2="50" y2="125" stroke="#e4ddd0" stroke-width="1.8"/>

  <!-- Points -->
  <circle cx="50" cy="210" r="2.5" fill="#e4ddd0"/>
  <circle cx="50" cy="125" r="2" fill="#e4ddd0"/>
  <circle cx="210" cy="23" r="2.5" fill="#e4ddd0"/>

  <!-- Labels -->
  <text x="34" y="226" fill="#e4ddd0" font-size="14" font-style="italic">O</text>
  <text x="14" y="129" fill="#e4ddd0" font-size="12">10</text>
  <text x="216" y="18" fill="#e4ddd0" font-size="14" font-style="italic">A</text>

  <!-- R label -->
  <text x="95" y="175" fill="#e4ddd0" font-size="15" font-style="italic">R</text>
</svg>
