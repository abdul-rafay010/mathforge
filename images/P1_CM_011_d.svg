<svg viewBox="0 0 300 230" xmlns="http://www.w3.org/2000/svg" font-family="Times New Roman, serif">
  <rect x="0" y="0" width="300" height="230" fill="#0a0a0a"/>

  <!-- Full sector arc -->
  <path d="M 240,210 A 180,180 0 0 0 187.4,106.7" fill="none" stroke="#e4ddd0" stroke-width="1.3"/>

  <!-- Radii OA and OB -->
  <line x1="60" y1="210" x2="240" y2="210" stroke="#e4ddd0" stroke-width="1.3"/>
  <line x1="60" y1="210" x2="187.4" y2="106.7" stroke="#e4ddd0" stroke-width="1.3"/>

  <!-- Segment CD -->
  <line x1="148.0" y1="210" x2="148.0" y2="134.3" stroke="#e4ddd0" stroke-width="1.3"/>

  <!-- Right-angle marker at C -->
  <path d="M 148,202 L 156,202 L 156,210" fill="none" stroke="#e4ddd0" stroke-width="1"/>

  <!-- Angle theta arc at O -->
  <path d="M 95,210 A 35,35 0 0 0 81.6,182.6" fill="none" stroke="#e4ddd0" stroke-width="1"/>
  <text x="92" y="195" fill="#e4ddd0" font-size="13" font-style="italic">&#952;</text>

  <!-- Points -->
  <circle cx="60" cy="210" r="2" fill="#e4ddd0"/>
  <circle cx="240" cy="210" r="2" fill="#e4ddd0"/>
  <circle cx="187.4" cy="106.7" r="2" fill="#e4ddd0"/>
  <circle cx="148.0" cy="210" r="2" fill="#e4ddd0"/>
  <circle cx="148.0" cy="134.3" r="2" fill="#e4ddd0"/>

  <!-- Labels -->
  <text x="44" y="222" fill="#e4ddd0" font-size="15" font-style="italic">O</text>
  <text x="247" y="222" fill="#e4ddd0" font-size="15" font-style="italic">B</text>
  <text x="190" y="98" fill="#e4ddd0" font-size="15" font-style="italic">A</text>
  <text x="138" y="226" fill="#e4ddd0" font-size="15" font-style="italic">C</text>
  <text x="156" y="130" fill="#e4ddd0" font-size="15" font-style="italic">D</text>

  <!-- r labels on radii -->
  <text x="148" y="202" fill="#e4ddd0" font-size="12" text-anchor="middle">r</text>
  <text x="113" y="148" fill="#e4ddd0" font-size="12" text-anchor="middle" transform="rotate(-30 113 148)">r</text>
</svg>
