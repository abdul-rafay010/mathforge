<svg viewBox="0 0 320 300" xmlns="http://www.w3.org/2000/svg" font-family="Times New Roman, serif">
  <rect x="0" y="0" width="320" height="300" fill="#0a0a0a"/>

  <!-- grid lines -->
  <g stroke="#4a4a4a" stroke-width="0.8">
    <line x1="60"  y1="20" x2="60"  y2="260"/>
    <line x1="100" y1="20" x2="100" y2="260"/>
    <line x1="140" y1="20" x2="140" y2="260"/>
    <line x1="180" y1="20" x2="180" y2="260"/>
    <line x1="220" y1="20" x2="220" y2="260"/>
    <line x1="260" y1="20" x2="260" y2="260"/>
    <line x1="20" y1="220" x2="260" y2="220"/>
    <line x1="20" y1="180" x2="260" y2="180"/>
    <line x1="20" y1="140" x2="260" y2="140"/>
    <line x1="20" y1="100" x2="260" y2="100"/>
    <line x1="20" y1="60"  x2="260" y2="60"/>
    <line x1="20" y1="20"  x2="260" y2="20"/>
