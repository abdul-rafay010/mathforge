<svg viewBox="0 0 320 220" xmlns="http://www.w3.org/2000/svg" font-family="Times New Roman, serif">
  <rect x="0" y="0" width="320" height="220" fill="#0a0a0a"/>

  <!-- axes -->
  <line x1="15" y1="180" x2="300" y2="180" stroke="#e4ddd0" stroke-width="1.3"/>
  <line x1="90" y1="20" x2="90" y2="200" stroke="#e4ddd0" stroke-width="1.3"/>
  <text x="295" y="195" fill="#e4ddd0" font-size="13" font-style="italic">x</text>
  <text x="96" y="26" fill="#e4ddd0" font-size="13" font-style="italic">y</text>

  <!-- curve y = sqrt(4x+1) -->
  <path d="M 83,180 C 100,180 118,160 146,96 C 170,46 200,18 230,6"
        fill="none" stroke="#e4ddd0" stroke-width="1.6"/>

  <!-- tangent line through A -->
  <line x1="20" y1="180" x2="230" y2="38" stroke="#e4ddd0" stroke-width="1.3" stroke-dasharray="5 3"/>

  <!-- Point A -->
  <circle cx="146" cy="96" r="2.5" fill="#e4ddd0"/>
  <text x="153" y="92" fill="#e4ddd0" font-size="14" font-style="italic">A</text>

  <!-- tangent x-intercept point -->
  <circle cx="20" cy="180" r="2.5" fill="#e4ddd0"/>

  <!-- curve x-intercept -->
  <circle cx="83" cy="180" r="2" fill="#e4ddd0"/>

  <!-- origin label -->
  <text x="78" y="196" fill="#e4ddd0" font-size="13" font-style="italic">O</text>

  <!-- curve label -->
  <text x="195" y="34" fill="#e4ddd0" font-size="13" font-style="italic">y = &#8730;(4x+1)</text>
</svg>
