<svg viewBox="0 0 420 260" xmlns="http://www.w3.org/2000/svg" style="background:#0a0a0a;">

  <!-- axis lines -->
  <line x1="60" y1="210" x2="390" y2="210" stroke="#e4ddd0" stroke-width="1.2"/>
  <line x1="60" y1="30"  x2="60"  y2="215" stroke="#e4ddd0" stroke-width="1.2"/>

  <!-- arrowheads -->
  <polygon points="390,207 397,210 390,213" fill="#e4ddd0"/>
  <polygon points="57,30 60,23 63,30"       fill="#e4ddd0"/>

  <!-- dashed reference line at y = 2/7 -->
  <line x1="60" y1="75" x2="350" y2="75" stroke="#a8883a" stroke-width="0.9" stroke-dasharray="5,4"/>

  <!-- PDF: line from (0,0) to (3, 2/7) then flat to (5, 2/7) -->
  <!-- x scale: 0→60, 3→240, 5→350  (60px/unit) -->
  <!-- y scale: 0→210, 2/7→75  (210-75=135px for 2/7, so 1unit=135/(2/7)=472.5 px/unit — not needed explicitly) -->
  <polyline points="60,210 240,75 350,75" fill="none" stroke="#e4ddd0" stroke-width="1.8"/>

  <!-- vertical drop at x=5 (dashed) -->
  <line x1="350" y1="75" x2="350" y2="210" stroke="#e4ddd0" stroke-width="0.9" stroke-dasharray="4,4"/>

  <!-- tick marks on x-axis -->
  <line x1="240" y1="207" x2="240" y2="213" stroke="#e4ddd0" stroke-width="1.2"/>
  <line x1="350" y1="207" x2="350" y2="213" stroke="#e4ddd0" stroke-width="1.2"/>

  <!-- tick mark on y-axis at 2/7 -->
  <line x1="57" y1="75" x2="63" y2="75" stroke="#e4ddd0" stroke-width="1.2"/>

  <!-- axis labels -->
  <text x="400" y="214" fill="#e4ddd0" font-family="serif" font-size="14" font-style="italic">x</text>
  <text x="50"  y="22"  fill="#e4ddd0" font-family="serif" font-size="13">f(x)</text>

  <!-- x-axis tick labels -->
  <text x="56"  y="226" fill="#e4ddd0" font-family="serif" font-size="13">0</text>
  <text x="236" y="226" fill="#e4ddd0" font-family="serif" font-size="13">3</text>
  <text x="346" y="226" fill="#e4ddd0" font-family="serif" font-size="13">5</text>

  <!-- y-axis tick label: 2/7 -->
  <text x="22" y="72"  fill="#e4ddd0" font-family="serif" font-size="13">2</text>
  <line x1="22" y1="75" x2="50" y2="75" stroke="#e4ddd0" stroke-width="0.8"/>
  <text x="22" y="87"  fill="#e4ddd0" font-family="serif" font-size="13">7</text>

</svg>
